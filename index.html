<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Audio čitač Google Docs</title>
</head>
<body>

<h2>Pokrećem čitanje...</h2>

<script>
// mapa dokumenata: broj iz ?id=... → javni Google Docs link
const docs = {
  1: "https://docs.google.com/document/d/e/2PACX-1vTvePUtF5I_zRFTKdqnxhJ5XSevUpYE7RynJ2jsahM40-hapbjSkzoOW9p2GZuF7Vdy3tny1BOAwfUn/pub",
  2: "https://docs.google.com/document/d/OVDJE_DRUGI_GOOGLE_DOC_ID/pub?output=txt",
  3: "https://docs.google.com/document/d/OVDJE_TRECI_GOOGLE_DOC_ID/pub?output=txt"
};

async function readDoc() {
  const urlParams = new URLSearchParams(window.location.search);
  const docNumber = urlParams.get("id");  // koristi "id" jer je tag već takav

  const docURL = docs[docNumber];

  if (!docURL) {
    document.body.innerHTML = "Dokument nije pronađen.";
    return;
  }

  try {
    const response = await fetch(docURL);

    if (!response.ok) {
      document.body.innerHTML = "Greška pri učitavanju dokumenta.";
      return;
    }

    const text = await response.text();

    if (!text.trim()) {
      document.body.innerHTML = "Dokument je prazan.";
      return;
    }

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "bs-BA"; // možeš mijenjati jezik, npr. "hr-HR" ili "en-US"
    speech.rate = 1;        // brzina čitanja

    speechSynthesis.speak(speech);

  } catch (err) {
    document.body.innerHTML = "Došlo je do greške: " + err;
  }
}

// pokreni čitanje čim se stranica učita
readDoc();

</script>

</body>
</html>
