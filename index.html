<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio čitač</title>
</head>

<body>

<h2>Pokrećem čitanje...</h2>

<script>

// lista dokumenata
const docs = {
  1: "1uuqPJFh5b0vZ70NMvHxb_FKZfRNPUT0fXmI4cL168EE",
  2: "OVDJE_ID_DRUGOG_DOKUMENTA",
  3: "OVDJE_ID_TRECEG_DOKUMENTA"
};

async function readDoc(){

 const urlParams = new URLSearchParams(window.location.search);
 const docNumber = urlParams.get("id");

 const docID = docs[docNumber];

 if(!docID){
   document.body.innerHTML = "Dokument nije pronađen.";
   return;
 }

 const response = await fetch(
   "https://docs.google.com/document/d/" + docID + "/export?format=txt"
 );

 const text = await response.text();

 const speech = new SpeechSynthesisUtterance(text);

 speech.lang = "bs-BA";
 speech.rate = 1;

 speechSynthesis.speak(speech);

}

readDoc();

</script>

</body>
</html>
